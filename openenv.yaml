spec_version: 1
name: fake-news-investigator
type: space
runtime: fastapi
app: server.app:app
port: 8000
version: "2.0.0"
description: >
  Veritas — a production-grade fact-checking RL environment. Agents learn to
  investigate claims through real Wikipedia retrieval, real DeBERTa NLI,
  real CLIP image-text alignment, perceptual hashing for reverse image
  search, Wikidata entity resolution, temporal analysis, and multi-source
  consensus scoring. Every step is logged to an RL trajectory database and
  every retrieval writes a chain-of-custody audit row. Seven segregated
  SQLite databases, ten action types, 162 curated publisher credibility
  ratings, FTS5-indexed evidence corpus. Built for the Meta PyTorch x
  Scaler OpenEnv Hackathon (2026).
